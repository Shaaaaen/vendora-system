<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="{{ url_for('static', filename='assets/icons/logo.png') }}" type="image/png">
  <title>Vendora</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="signup-body">

<div class="signup-container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <h2 class="left-title" data-lang="welcome"><b>Welcome to Vendora!</b></h2>
      <p class="left-subtitle" data-lang="subtitle">Start managing your small business easily.</p>
      <img src="{{ url_for('static', filename='assets/icons/signup_bg.png') }}" class="left-image">
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Language Switcher -->
    <div class="lang-switch">
      🌐
      <select onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ms">Bahasa Melayu</option>
        <option value="id">Indonesia</option>
        <option value="bn">বাংলা</option>
        <option value="ne">नेपाली</option>
        <option value="hi">हिन्दी</option>
        <option value="my">မြန်မာ</option>
        <option value="ph">Filipino</option>
        <option value="vi">Tiếng Việt</option>
      </select>
    </div>

    <!-- Security Setup Form -->
    <div class="signup-title">
      <h2 data-lang="securityTitle"><b>Security Setup</b></h2>
    </div>

    <div class="info-card2">
      <label data-lang="securityKey">Security Key</label>
      <div class="input-group">
        <input type="text" id="securityKey" data-lang-placeholder="SecKey" placeholder="Enter a unique security key">
      </div>

      <label data-lang="securityQuestion">Security Question</label>
      <div class="input-group">
        <select id="securityQuestion">
          <!-- Options will be populated dynamically -->
        </select>
      </div>

      <label data-lang="answer">Your Answer</label>
      <div class="input-group">
        <input type="text" id="securityAnswer" data-lang-placeholder="answer" placeholder="">
      </div>  

      <p id="securityErrorMsg" class="error-msg"></p>
      <button onclick="submitSignup()" data-lang="signupBtn">Sign Up</button>
    </div>

    <div class="progress">
      <span class="pill"></span>
      <span class="pill active"></span>
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
<script>
  // List of security question keys
  const securityQuestionsKeys = ["q1","q2","q3","q4","q5","q6","q7","q8","q9","q10"];

  function populateSecurityQuestions() {
    const select = document.getElementById("securityQuestion");

    // Keep first "Select question" option
    select.innerHTML = `<option value="">${translations[currentLang].select}</option>`;

    securityQuestionsKeys.forEach(q => {
      const option = document.createElement("option");
      option.value = translations[currentLang][q]; // send actual text as value
      option.textContent = translations[currentLang][q];
      select.appendChild(option);
    });
  }

  // Initial population
  populateSecurityQuestions();

  // Update everything when language changes
  function changeLanguage(lang) {
    currentLang = lang;

    // Update text content
    document.querySelectorAll("[data-lang]").forEach(el => {
      el.textContent = translations[lang][el.dataset.lang];
    });

    // Update placeholders
    document.querySelectorAll("[data-lang-placeholder]").forEach(el => {
      el.placeholder = translations[lang][el.dataset.langPlaceholder];
    });

    // Update security questions
    populateSecurityQuestions();
  }
</script>
</body>
</html>
