<div class="header">
  <div class="header-left">
    <img src="{{ url_for('static', filename='assets/icons/logo.png') }}" class="logo-img">
    <h2>{{ header_title }}</h2>
  </div>
  <div class="header-right">

    <!-- Language switch (do later) -->
<div class="lang-switch" translate="no">
      🌐
      <select onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh-CN">中文</option>
        <option value="ms">Bahasa Melayu</option>
        <option value="id">Indonesia</option>
        <option value="bn">বাংলা</option>
        <option value="ne">नेपाली</option>
        <option value="hi">हिन्दी</option>
        <option value="my">မြန်မာ</option>
        <option value="tl">Filipino</option>
        <option value="vi">Tiếng Việt</option>
      </select>
    </div>

    <!-- Profile image -->
    {% set profile_img = 'profile1.jpg' %}
    {% if user is defined and user and user.avatar %}
      {% set profile_img = user.avatar %}
    {% endif %}

    <img src="{{ url_for('static', filename='assets/images/profile/' + profile_img) }}"
         class="profile-icon" onclick="openProfile()">

  </div>
</div>
