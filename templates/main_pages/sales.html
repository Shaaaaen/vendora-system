{% extends 'base.html' %}

{% block title %}My Business - Sales{% endblock %}

{% block content %}
<div class="main-content">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="tabs">
            <a class="tab" href="{{ url_for('ingredients') }}">
                <span>🥬</span><span>Ingredients</span>
            </a >
            <a class="tab" href="{{ url_for('products') }}">
                <span>🧀</span><span>Products</span>
            </a >
            <a class="tab active" href="{{ url_for('sales') }}">
                <span class="notranslate" data-key="record_sales">Record Sales</span>
            </a >
        </div>
        <div class="top-bar-right">
            <button class="add-btn" onclick="openHistoricalSaleModal()" style="background:#6C7FD8; margin-right:8px;">📅 Add Historical Sale</button>
            <button class="add-btn" onclick="openAddSaleModal()">+ Add Sales</button>
        </div>
    </div>

    <!-- TWO-COLUMN LAYOUT -->
    <div class="sales-two-col">

        <!-- LEFT: RECORD DAILY SALES -->
        <div class="card-section sales-record-section">
            <h3 class="section-title">Record Your Daily Sales Here</h3>
            <div id="dailySalesList" class="product-grid"></div>
        </div>

        <!-- RIGHT: SALES HISTORY -->
        <div class="card-section sales-history-section">
            <div class="sales-history-topbar">
                <h3 class="section-title" style="margin:0;">Sales Records</h3>
                <div class="sales-filter-row">
                    <input type="date" id="filterDate" class="sales-filter-input">
                    <button class="sales-filter-clear-btn" onclick="clearDateFilter()">Clear</button>
                </div>
            </div>
            <div id="salesList"></div>
        </div>

    </div>

</div>

<!-- HISTORICAL SALE MODAL -->
<div id="historicalSaleModal" class="modal" style="display:none;">
    <div class="modal-content product-modal-add add-sale-modal" style="max-width:480px; max-height:90vh; overflow-y:auto;">
        <div class="modal-header">
            <h2>📅 Add Historical Sale</h2>
            <span class="close-btn" onclick="closeHistoricalSaleModal()">✕</span>
        </div>
        <div class="add-sale-form-body">
            <!-- Mode-->
            <div class="input-block">
                <label>Mode</label>
                <div style="display:flex; gap:10px;">
                    <button type="button" id="modeSingleBtn" onclick="setHistMode('single')">Single Day</button>
                    <button type="button" id="modeMultiBtn" onclick="setHistMode('multi')">Multi Days</button>
                </div>
            </div>

            <div id="singleModeBox">
                <!-- Date (required) -->
                <div class="input-block">
                    <label>📆 Sale Date <span style="color:#e74c3c">*</span></label>
                    <div class="input-group">
                        <input type="date" id="histDate" style="width:100%; padding:10px; border:none; background:transparent; font-size:14px;">
                    </div>
                </div>

                <!-- Total Profit (required) -->
                <div class="input-block">
                    <label>💰 Total Profit for that Day <span style="color:#e74c3c">*</span></label>
                    <div class="input-group" style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:700; color:#7a5c3a; padding-left:8px;" id="histSymbol">RM</span>
                        <input type="number" id="histProfit" min="0" step="0.01" placeholder="e.g. 250.00"
                            style="flex:1; padding:10px; border:none; background:transparent; font-size:14px;">
                    </div>
                </div>

                <!-- Items (optional) -->
                <div class="input-block">
                    <label>🛒 Items Sold <span style="color:#aaa; font-size:12px;">(optional)</span></label>
                    <div id="histItemsList"></div>
                    <button type="button" onclick="addHistItem()"
                            style="margin-top:8px; background:#f4c245; border:none; padding:7px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600;">
                        + Add Item
                    </button>
                </div>
            </div>
            
            <div id="multiModeBox" style="display:none;">
                <div id="multiHistList" class="accordion-list"></div>

                <button type="button" onclick="addHistRow()" style="margin-top:10px;">
                    + Add Row
                </button>
            </div>
        </div>
        <div class="modal-footer" style="margin-top:20px;">
            <button class="btn-cancel" onclick="closeHistoricalSaleModal()">Cancel</button>
            <button class="btn-save" onclick="submitHistoricalSale()">Save Historical Sale</button>
        </div>
    </div>
</div>

<!-- ADD SALE MODAL -->
<div id="addSaleModal" class="modal" style="display:none;">
    <div class="modal-content product-modal-add add-sale-modal">
        <div class="modal-header">
            <h2>🛒 Add New Sale</h2>
            <span class="close-btn" onclick="closeAddSaleModal()">✕</span>
        </div>
        <div class="add-sale-form-body">
            <div class="input-block">
                <label>Select Product</label>
                <div class="input-group">
                    <select id="modalProductSelect">
                        <option value="">-- Choose a product --</option>
                    </select>
                </div>
            </div>
            <div class="input-block">
                <label>Quantity</label>
                <div class="input-group modal-qty-group">
                    <button type="button" class="modal-qty-btn" onclick="modalChangeQty(-1)">−</button>
                    <input type="number" id="modalQtyInput" value="1" min="1">
                    <button type="button" class="modal-qty-btn" onclick="modalChangeQty(1)">+</button>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="margin-top:24px;">
            <button class="btn-cancel" onclick="closeAddSaleModal()">Cancel</button>
            <button class="btn-save notranslate" data-key="save_sale" onclick="submitModalSale()">Save Sale</button>
        </div>
    </div>
</div>

<script>
    window.currencySymbol = "{{ user.symbol if user else 'RM' }}";
</script>
<script src="{{ url_for('static', filename='js/add_sales.js') }}"></script>
{% endblock %}
